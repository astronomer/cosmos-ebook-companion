version: 2

models:
  - name: stg_customers
    description: "Staged customer data, exposed publicly for cross-project reference."
    access: public
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Staged order data, exposed publicly for cross-project reference."
    access: public
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
